<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Traffic Sense | Pre-Test</title>

    <link rel="stylesheet" href="css/quiz.css">

</head>

<body>

    <!-- ================= HEADER ================= -->

    <header>

        <h1>🚦 Traffic Sense</h1>

        <p>Pre-Test Assessment</p>

    </header>


    <!-- ================= USER DETAILS ================= -->

    <section class="user-details">

        <h2>Enter Your Details</h2>

        <form>

            <label>Full Name</label>

            <input
                type="text"
                placeholder="Enter your full name"
                required>

            <label>Age</label>

            <input
                type="number"
                placeholder="Enter your age"
                required>

            <label>City</label>

            <input
                type="text"
                placeholder="Enter your city">

            <label>Vehicle Type</label>

            <select>

                <option>Select</option>

                <option>Two Wheeler</option>

                <option>Car</option>

                <option>Commercial Vehicle</option>

                <option>I Don't Drive Yet</option>

            </select>

        </form>

    </section>



    <!-- ================= QUIZ ================= -->

    <section class="quiz-container">

        <h2>Traffic Rules Quiz</h2>


        <!-- Question 1 -->

        <div class="question">

            <h3>1. What does a red traffic light indicate?</h3>

            <label><input type="radio" name="q1"> Stop</label>

            <label><input type="radio" name="q1"> Slow Down</label>

            <label><input type="radio" name="q1"> Go</label>

            <label><input type="radio" name="q1"> Turn Right</label>

        </div>


        <!-- Question 2 -->

        <div class="question">

            <h3>2. Why should you wear a helmet?</h3>

            <label><input type="radio" name="q2"> Style</label>

            <label><input type="radio" name="q2"> Safety</label>

            <label><input type="radio" name="q2"> Weather</label>

            <label><input type="radio" name="q2"> None</label>

        </div>


        <!-- Question 3 -->

        <div class="question">

            <h3>3. Seat belts should be worn by?</h3>

            <label><input type="radio" name="q3"> Driver Only</label>

            <label><input type="radio" name="q3"> Front Passenger</label>

            <label><input type="radio" name="q3"> Everyone in the Vehicle</label>

            <label><input type="radio" name="q3"> Children Only</label>

        </div>


        <!-- Question 4 -->

        <div class="question">

            <h3>4. Mobile phones while driving are?</h3>

            <label><input type="radio" name="q4"> Safe</label>

            <label><input type="radio" name="q4"> Dangerous</label>

            <label><input type="radio" name="q4"> Recommended</label>

            <label><input type="radio" name="q4"> Necessary</label>

        </div>


        <!-- Question 5 -->

        <div class="question">

            <h3>5. Speed limits are meant to?</h3>

            <label><input type="radio" name="q5"> Increase Speed</label>

            <label><input type="radio" name="q5"> Improve Safety</label>

            <label><input type="radio" name="q5"> Save Fuel Only</label>

            <label><input type="radio" name="q5"> None</label>

        </div>


        <button id="submitQuiz">

            Submit Quiz

        </button>

    </section>



    <script src="js/quiz.js"></script>

</body>

</html>
